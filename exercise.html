<!DOCTYPE html>
<html>
<head>
  <title>Exercise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="container" class="exercise-page">
    <h1 id="exerciseName"></h1>
    <img id="img" class="exercise-img" />

    <p id="instructions" class="instructions"></p>

    <section id="details" class="exercise-details"></section>

    <div id="controls">
      <button id="start">Start</button>
      <button id="leave">Leave</button>
    </div>

    <div id="status"></div>
  </main>

  <script type="module" src="js/workout.js"></script>
</body>
</html>
